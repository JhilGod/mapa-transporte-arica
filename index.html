<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linea Map - Taxis Colectivos</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="mapa.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <img src="Logo.jpeg" alt="Logo Linea Map" class="logo-img">
            <h2 class="brand-title">Linea Map</h2>
            <p>Directorio de Taxis Colectivos</p>
            <button onclick="entrarInvitado()" class="btn-invitado">Entrar al Mapa</button>
        </div>
    </div>

    <button id="btn-menu" onclick="toggleSidePanel()" style="display: none;">☰ Rutas</button>

    <button id="btn-theme" onclick="toggleTheme()" title="Cambiar tema">🌙</button>

    <div id="map"></div>

    <button onclick="centrarEnUsuario()" class="btn-locate" title="Mi ubicación">🎯</button>

    <div id="side-panel">
        <div class="panel-header">
            <div class="panel-tabs">
                <div class="tab active" onclick="cambiarPestana('destinos')">Destinos</div>
                <div class="tab inactive" onclick="cambiarPestana('lineas')">Líneas</div>
            </div>
            <button class="btn-close-panel" onclick="toggleSidePanel()">✕</button>
        </div>

        <div class="panel-body">
            <div id="tab-destinos" class="tab-content active">
                <div class="search-container">
                    <div class="panel-search-box">
                        <input type="text" id="panel-search-input" placeholder="Buscar dirección o lugar..." autocomplete="off" oninput="manejarInputBusqueda()">
                        <button onclick="forzarBusqueda()">🔍</button>
                    </div>
                    <ul id="search-suggestions" class="suggestions-list"></ul>
                </div>

                <h3 class="panel-title">DESTINOS FRECUENTES</h3>
                <ul class="stop-list">
                    <li onclick="irADestino(-18.4886, -70.2968, 'Universidad de Tarapacá')">
                        <span class="stop-name">UTA</span><span class="dot dot-red"></span>
                    </li>
                    <li onclick="irADestino(-18.4815, -70.3134, 'Santo Tomás')">
                        <span class="stop-name">SANTO TOMÁS</span><span class="dot dot-magenta"></span>
                    </li>
                    <li onclick="irADestino(-18.4764, -70.3106, 'Hospital Regional')">
                        <span class="stop-name">HOSP. REGIONAL</span><span class="dot dot-blue"></span>
                    </li>
                    <li onclick="irADestino(-18.4735, -70.3080, 'Hospital San José')">
                        <span class="stop-name">HOSP. SAN JOSÉ</span><span class="dot dot-orange"></span>
                    </li>
                    <li onclick="irADestino(-18.4744, -70.3115, 'Mall Plaza')">
                        <span class="stop-name">MALL PLAZA</span><span class="dot dot-green"></span>
                    </li>
                    <li onclick="irADestino(-18.4985, -70.2905, 'El Agro')">
                        <span class="stop-name">EL AGRO</span><span class="dot" style="background-color: #f1c40f;"></span>
                    </li>
                </ul>
            </div>

            <div id="tab-lineas" class="tab-content">
                <div id="lines-container">
                    <p style="text-align: center; color: #888; font-size: 14px;">Cargando rutas...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="mapa.js"></script>
</body>
</html>
